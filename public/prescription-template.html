<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prescription</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important; }

body {
  font-family: 'Noto Naskh Arabic', 'Segoe UI', Arial, sans-serif;
  font-size: 9.5pt;
  color: #222;
  background: white;
  width: 210mm;
  margin: 0 auto;
}

/* Wrapper pushes footer to bottom on screen */
.page-wrap {
  min-height: 297mm;
  display: flex;
  flex-direction: column;
}
.page-wrap .body { flex: 1; }

/* HEADER */
.header {
  border-bottom: 3px solid #1a7f7f;
  text-align: center;
  padding: 8px 0 6px;
}
.header img {
  max-height: 80px;
  max-width: 280px;
  object-fit: contain;
}

/* BODY */
.body { padding: 8px 18px; }

/* META */
.meta-row {
  display: flex;
  justify-content: space-between;
  font-size: 9pt;
  font-weight: bold;
  color: #1a7f7f;
  margin-bottom: 6px;
  direction: ltr;
}

/* DOCTOR BAR */
.doctor-bar {
  background: #1a7f7f !important;
  color: white !important;
  padding: 5px 12px;
  border-radius: 4px;
  display: flex;
  gap: 24px;
  font-size: 9pt;
  margin-bottom: 8px;
  direction: ltr;
}
.doctor-bar strong { color: #cff !important; }

/* TWO COLUMNS */
.two-col {
  display: flex;
  gap: 14px;
  direction: ltr;
  margin-bottom: 6px;
}
.col-left  { width: 195px; flex-shrink: 0; }
.col-right { flex: 1; }

.section-title {
  color: #1a7f7f;
  font-weight: bold;
  font-size: 9.5pt;
  border-bottom: 1.5px solid #1a7f7f;
  padding-bottom: 2px;
  margin-bottom: 5px;
  text-align: center;
}
.field-row { display: flex; margin-bottom: 4px; font-size: 9pt; direction: ltr; align-items: baseline; }
.field-label { font-weight: bold; width: 58px; flex-shrink: 0; color: #333; }
.field-label::after { content: " :"; }
.field-value { color: #222; padding-left: 4px; }

/* RX TABLE */
.rx-title { color: #1a7f7f; font-weight: bold; font-size: 10pt; margin-bottom: 5px; }
.rx-table { width: 100%; border-collapse: collapse; font-size: 8.5pt; direction: ltr; }
.rx-table thead tr { background: #1a7f7f !important; }
.rx-table thead td { padding: 4px 7px; font-weight: bold; color: white !important; }
.rx-table tbody tr:nth-child(even) { background: #edf7f7 !important; }
.rx-table tbody td { padding: 4px 7px; border: 1px solid #c8e6e6; }

/* SIGNATURE */
.signature {
  text-align: center;
  color: #888;
  font-style: italic;
  font-size: 9pt;
  margin: 18px 0 10px;
}
.signature::before {
  content: '';
  display: block;
  width: 140px;
  border-top: 1px solid #bbb;
  margin: 0 auto 4px;
}

/* FOOTER */
.footer {
  background: linear-gradient(90deg, #155f5f, #1a7f7f, #155f5f) !important;
  padding: 10px 20px 9px;
  text-align: center;
  margin-top: 0;
}
.footer-address {
  color: white !important;
  font-size: 9.5pt;
  direction: rtl;
  font-weight: bold;
  margin-bottom: 4px;
  font-family: 'Noto Naskh Arabic', Arial, sans-serif;
}
.footer-tel {
  color: white !important;
  font-size: 9pt;
  font-weight: bold;
  direction: ltr;
}

/* PRINT */
@media print {
  body { margin: 0; width: 210mm; }
  @page { size: A4 portrait; margin: 0; }
  
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    margin-top: 0;
  }
  .body {
    padding-bottom: 80px;
  }
}
</style>
</head>

  <div class="meta-row">
    <span>Rescription ID : <span id="prescId"></span></span>
    <span id="prescDate"></span>
  </div>

  <div class="doctor-bar">
    <div><strong>Doctor:</strong> <span id="doctorName"></span></div>
    <div><strong>Specialist:</strong> <span id="doctorSpec"></span></div>
    <div><strong>Contact:</strong> <span id="doctorContact"></span></div>
  </div>

  <div class="two-col">
    <div class="col-left">
      <div class="section-title">Patient Information</div>
      <div class="field-row"><span class="field-label">Name</span><span class="field-value" id="patName"></span></div>
      <div class="field-row"><span class="field-label">Age</span><span class="field-value" id="patAge"></span></div>
      <div class="field-row"><span class="field-label">Gender</span><span class="field-value" id="patGender"></span></div>
      <br>
      <div class="section-title">Clinical Records</div>
      <div class="field-row"><span class="field-label">BP</span><span class="field-value" id="recBP"></span></div>
      <div class="field-row"><span class="field-label">SH</span><span class="field-value" id="recSH"></span></div>
      <div class="field-row"><span class="field-label">WT</span><span class="field-value" id="recWT"></span></div>
      <div class="field-row"><span class="field-label">CC</span><span class="field-value" id="recCC"></span></div>
    </div>

    <div class="col-right">
      <div class="rx-title">Rx :</div>
      <table class="rx-table">
        <thead>
          <tr>
            <td style="width:7%">#</td>
            <td style="width:20%">Type</td>
            <td style="width:33%">Name</td>
            <td style="width:10%">Qty</td>
            <td style="width:30%">Dose</td>
          </tr>
        </thead>
        <tbody id="rxBody"></tbody>
      </table>
    </div>
  </div>

  <div class="signature">Stamp / Signature</div>
</div>

<div class="footer">
  <div class="footer-address" id="footerAddress"></div>
  <div class="footer-tel" id="footerTel"></div>
</div>

</div><!-- end page-wrap -->
<script>
// Fill data from URL params
const params = new URLSearchParams(window.location.search);
const data = JSON.parse(decodeURIComponent(params.get('data') || '{}'));

// Load clinic settings from API for footer
fetch('/api/settings')
  .then(r => r.json())
  .then(settings => {
    document.getElementById('footerAddress').textContent = settings.clinic_address || '';
    document.getElementById('footerTel').textContent = settings.clinic_phone ? 'Tel: ' + settings.clinic_phone : '';
  })
  .catch(() => {});

document.getElementById('prescId').textContent = data.rescription_id || '';
document.getElementById('prescDate').textContent = data.created_at ? new Date(data.created_at).toLocaleDateString('en-GB') : '';
document.getElementById('doctorName').textContent = data.doctor_name || '';
document.getElementById('doctorSpec').textContent = data.specialist_in || '';
document.getElementById('doctorContact').textContent = data.contact || '';
document.getElementById('patName').textContent = data.patient_name || '';
document.getElementById('patAge').textContent = data.age || '';
document.getElementById('patGender').textContent = data.gender || '';
document.getElementById('recBP').textContent = data.bp || '—';
document.getElementById('recSH').textContent = data.sh || '—';
document.getElementById('recWT').textContent = data.wt || '—';
document.getElementById('recCC').textContent = data.cc || '—';
// footer loaded from settings API above

// Rx table
const tbody = document.getElementById('rxBody');
const meds = data.medicines || [];
if (meds.length === 0) {
  tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;padding:8px">No medicines prescribed</td></tr>';
} else {
  tbody.innerHTML = meds.map((m, i) => `<tr>
    <td>${i+1}</td>
    <td>${m.type_medicine||''}</td>
    <td>${m.name_medicine||''}</td>
    <td>${m.quantity||''}</td>
    <td>${m.dose||''}</td>
  </tr>`).join('');
}

// Auto print if ?print=1
if (params.get('print') === '1') {
  window.onload = () => setTimeout(() => window.print(), 500);
}
</script>
</body>
</html>
